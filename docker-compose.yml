services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: smartdiet
      POSTGRES_USER: smartdiet
      POSTGRES_PASSWORD: smartdiet
    ports:
      - "5432:5432"
    volumes:
      - smartdiet_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdiet -d smartdiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: docker
      AUTH_ENABLED: "false"
      SECRET_KEY: change-me-before-production
      DATABASE_URL: postgresql+psycopg://smartdiet:smartdiet@postgres:5432/smartdiet
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  smartdiet_postgres:
